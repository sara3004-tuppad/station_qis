# Set to true to run without Azure credentials (mocks email + SharePoint)
dev_mode: true

# All Power Automate HTTP trigger URLs are loaded from secrets.
# No Graph API app registration or admin permissions required —
# flows run under the flow owner's delegated account.
power_automate:
  webhook_url: ""        # email trigger
  excel_download_url: "" # returns base64 Excel bytes
  excel_upload_url: ""   # receives base64 Excel bytes and overwrites file
  pdf_upload_url: ""     # receives base64 PDF + filename, returns SharePoint URL

# SharePoint PDF storage folder — used only by the pdf-upload Power Automate flow
sharepoint:
  upload_folder: "Shared Documents/QIS Invoices"

# Excel tracker
excel:
  local_cache_path: "data/Stations movement Tracker.xlsx"  # used in dev_mode only
  quality_sheet: "Quality clearance sheet"
  allocation_sheet: "Allocation sheet - working"

# Email configuration
email:
  sender: ""                                # your Outlook address
  recipients:
    quality_team: []                        # e.g. ["user@company.com"]
    stores_team: []
    cpt: []
    deployment_team: []
  # which fields per sheet must be non-empty to consider a row "complete"
  completion_check:
    allocation:
      - "Allocation"
      - "Date of Dispatch"
      - "No of QIS delivered"
      - "E-Way Bill"
  email_template: "templates/email_body.html"
  subject_template: "QIS Station Movement Update - {site_name}"

# App settings
app:
  title: "Stations Movement Tracker"
  roles:
    - "Quality Team"
    - "Stores Team"
    - "CPT"
  # Set a password per role to restrict access (leave empty string for no password)
  role_passwords:
    Quality Team: ""
    Stores Team: ""
    CPT: ""
  pickup_status_options:
    - "Picked up"
    - "In Transit"
    - "Hold"
  pdi_options:
    - "Done"
    - "Pending"
    - "NA"
