# Set to true to run without Azure credentials (mocks email + SharePoint)
dev_mode: false

# Graph API credentials — loaded from secrets (only used when dev_mode: false)
graph:
  tenant_id: ""
  client_id: ""
  username: ""
  password: ""

# SharePoint — share URLs loaded from secrets
# Share the invoice folder with qis-app@... and paste its share URL in secrets
sharepoint:
  folder_share_url: "" # set via secrets

# Excel tracker — share URL loaded from secrets
excel:
  sharepoint_url: "" # set via secrets
  local_cache_path: "data/Stations movement Tracker.xlsx" # used in dev_mode only
  quality_sheet: "Quality clearance sheet"
  allocation_sheet: "Allocation sheet - working"

# Email configuration
email:
  sender: "sara.tuppad@indofastenergy.com" # your Outlook address
  recipients:
    quality_team: [ "gmukul11@gmail.com" ] # e.g. ["user@company.com"]
    stores_team: []
    cpt: []
    deployment_team: []
  # which fields per sheet must be non-empty to consider a row "complete"
  completion_check:
    allocation:
    - "Allocation"
    - "Date of Dispatch"
    - "No of QIS delivered"
    - "E-Way Bill"
  email_template: "templates/email_body.html"
  subject_template: "QIS Station Movement Update - {site_name}"

# App settings
app:
  title: "Stations Movement Tracker"
  pickup_status_options:
  - "Picked up"
  - "In Transit"
  - "Hold"
  pdi_options:
  - "Done"
  - "Pending"
  - "NA"
  qis_type_options:
  - "Split AC"
  - "6DS"
